{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image }}:{{ $svc.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ $name }}-config
          {{- if eq $name "auth-service" }}
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: password }
          {{- end }}
          startupProbe:
            httpGet:
              path: {{ $svc.probePath.liveness }}
              port: {{ $svc.port }}
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: {{ $svc.probePath.liveness }}
              port: {{ $svc.port }}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ $svc.probePath.readiness }}
              port: {{ $svc.port }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu }}
              memory: {{ $svc.resources.requests.memory }}
            limits:
              cpu: {{ $svc.resources.limits.cpu }}
              memory: {{ $svc.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
