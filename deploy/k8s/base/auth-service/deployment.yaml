apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: platform
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: platform/auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              name: http
          envFrom:
            - configMapRef:
                name: auth-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: password }
          startupProbe:
            httpGet:
              path: /healthz
              port: 4001
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4001
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4001
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
