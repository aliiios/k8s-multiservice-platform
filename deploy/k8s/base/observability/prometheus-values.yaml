prometheus:
  prometheusSpec:
    retention: 1h
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 384Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

grafana:
  resources:
    requests:
      cpu: 30m
      memory: 96Mi
    limits:
      cpu: 150m
      memory: 192Mi
  adminPassword: "changeme-admin"
  persistence:
    enabled: true
    storageClassName: standard
    size: 512Mi

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  resources:
    requests:
      cpu: 30m
      memory: 96Mi
    limits:
      cpu: 150m
      memory: 192Mi
