apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: platform
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: platform/notification-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
              name: http
          envFrom:
            - configMapRef:
                name: notification-service-config
          startupProbe:
            httpGet:
              path: /healthz
              port: 4002
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4002
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4002
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
